<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Абхазия · чек-лист</title>
<!-- PWA / iPhone -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1f7a5c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Абхазия">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root{
    --bg:#f4f1ea; --card:#fffdf8; --ink:#2b2620; --muted:#8a8175;
    --line:#e7e0d3; --accent:#1f7a5c; --accent-soft:#e3f1ea;
    --done:#b7ac99; --warn:#c9822f; --warn-soft:#fbeedd; --red:#c14b3f;
    --shadow:0 1px 3px rgba(60,50,30,.08),0 6px 18px rgba(60,50,30,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--ink);
    padding-bottom:calc(88px + env(safe-area-inset-bottom)); -webkit-font-smoothing:antialiased;
  }
  /* ---- Lock screen ---- */
  #lock{
    position:fixed; inset:0; z-index:100; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:24px;
  }
  #lock.hidden{display:none}
  #lock .logo{font-size:52px}
  #lock h2{margin:0; font-size:20px; font-weight:700}
  #lock p{margin:0; font-size:13px; color:var(--muted); text-align:center; max-width:280px; line-height:1.5}
  #lock .row{display:flex; gap:8px; width:100%; max-width:300px; margin-top:6px}
  #lock button{
    border:0; background:var(--accent); color:#fff; font-family:inherit; font-weight:700; font-size:16px;
    padding:0 18px; border-radius:12px; cursor:pointer;
  }
  #lock .err{color:var(--red); font-size:12.5px; font-weight:600; min-height:16px; text-align:center; max-width:300px; line-height:1.4}
  /* ---- App ---- */
  header{position:sticky; top:0; z-index:20; background:var(--bg); padding:calc(12px + env(safe-area-inset-top)) 16px 9px; border-bottom:1px solid var(--line)}
  .h-row{display:flex; align-items:center; justify-content:space-between; gap:10px}
  h1{font-size:18px; margin:0; font-weight:700; letter-spacing:-.2px}
  .h-right{display:flex; align-items:center; gap:8px}
  .date{font-size:11.5px; color:var(--muted); font-weight:600}
  .editbtn{border:1px solid var(--line); background:var(--card); color:var(--muted); font-family:inherit; font-size:12px; font-weight:700; padding:6px 12px; border-radius:99px; cursor:pointer}
  body.editmode .editbtn{background:var(--accent); border-color:var(--accent); color:#fff}
  .bar{height:8px; background:var(--line); border-radius:99px; margin-top:11px; overflow:hidden}
  .bar > i{display:block; height:100%; width:0; background:var(--accent); border-radius:99px; transition:width .35s ease}
  .bar-lbl{font-size:11px; color:var(--muted); margin-top:6px; font-weight:600}
  nav{position:fixed; bottom:0; left:0; right:0; z-index:30; display:flex; background:var(--card); border-top:1px solid var(--line); box-shadow:0 -2px 12px rgba(60,50,30,.06); padding-bottom:env(safe-area-inset-bottom)}
  nav button{flex:1; border:0; background:none; padding:8px 1px 9px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:2px; color:var(--muted); font-family:inherit; position:relative}
  nav button .ic{font-size:19px; line-height:1}
  nav button .tx{font-size:10px; font-weight:600; letter-spacing:-.2px}
  nav button.on{color:var(--accent)}
  nav button .dot{position:absolute; top:4px; right:calc(50% - 22px); min-width:15px; height:15px; background:var(--warn); color:#fff; border-radius:99px; font-size:9.5px; font-weight:700; display:flex; align-items:center; justify-content:center; padding:0 4px}
  nav button.done .dot{background:var(--accent)}
  main{padding:14px 14px 20px; max-width:640px; margin:0 auto}
  .page{display:none; animation:fade .25s ease}
  .page.on{display:block}
  @keyframes fade{from{opacity:0; transform:translateY(4px)}to{opacity:1; transform:none}}
  .group{background:var(--card); border:1px solid var(--line); border-radius:16px; margin-bottom:14px; box-shadow:var(--shadow); overflow:hidden}
  .g-head{display:flex; align-items:center; gap:9px; padding:13px 15px; cursor:pointer; user-select:none}
  .g-head .emo{font-size:17px}
  .g-head .ttl{font-weight:700; font-size:14.5px; flex:1; letter-spacing:-.2px}
  .g-head .cnt{font-size:11.5px; color:var(--muted); font-weight:700; background:var(--bg); padding:3px 9px; border-radius:99px}
  .g-head .cnt.full{background:var(--accent-soft); color:var(--accent)}
  .g-head .chev{color:var(--muted); font-size:12px; transition:transform .2s; margin-left:2px}
  .group.closed .chev{transform:rotate(-90deg)}
  .group.closed .items{display:none}
  .items{padding:2px 6px 6px}
  .item{display:flex; align-items:flex-start; gap:11px; padding:11px 10px; border-radius:11px; cursor:pointer; transition:background .12s}
  .item:active{background:var(--bg)}
  .box{flex:none; width:23px; height:23px; border:2px solid var(--line); border-radius:7px; margin-top:1px; display:flex; align-items:center; justify-content:center; transition:all .15s; background:#fff}
  .box svg{width:14px; height:14px; opacity:0; transform:scale(.5); transition:all .15s}
  .item.checked .box{background:var(--accent); border-color:var(--accent)}
  .item.checked .box svg{opacity:1; transform:none}
  .lbl{font-size:14.5px; line-height:1.35; padding-top:1px; flex:1}
  .item.checked .lbl{color:var(--done); text-decoration:line-through; text-decoration-color:var(--done)}
  .note{display:block; font-size:11.5px; color:var(--warn); font-weight:600; margin-top:2px}
  .item.checked .note{color:var(--done); text-decoration:none}
  .sub{font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; padding:12px 14px 3px}
  .intro{font-size:12.5px; color:var(--muted); line-height:1.5; padding:2px 6px 10px}
  .loading{font-size:13px; color:var(--muted); text-align:center; padding:40px 12px}
  .acts{display:none; gap:6px; flex:none}
  body.editmode .acts{display:flex}
  body.editmode .item{cursor:default}
  body.editmode .item .box{opacity:.35}
  .act{width:30px; height:30px; border-radius:8px; border:1px solid var(--line); background:#fff; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; padding:0}
  .act.del{color:var(--red); border-color:#e6cfc9}
  .addrow{display:none; align-items:center; gap:8px; padding:9px 12px; margin:2px 4px 4px; border:1.5px dashed var(--line); border-radius:11px; color:var(--accent); font-weight:700; font-size:13px; cursor:pointer; background:var(--card)}
  body.editmode .addrow{display:flex}
  .addrow:active{background:var(--accent-soft)}
  .newgrp{display:none; align-items:center; gap:8px; padding:11px 12px; margin:4px 4px 14px; border:1.5px dashed var(--accent); border-radius:12px; color:var(--accent); font-weight:700; font-size:13px; cursor:pointer; background:var(--card); justify-content:center}
  body.editmode .newgrp{display:flex}
  .foot{text-align:center; padding:8px 0 4px; display:flex; flex-direction:column; gap:8px; align-items:center}
  .reset{background:none; border:1px solid var(--line); color:var(--muted); font-family:inherit; font-size:12px; font-weight:600; padding:9px 16px; border-radius:99px; cursor:pointer}
  .reset:active{background:var(--card)}
  .hint{font-size:11.5px; color:var(--muted); text-align:center; margin-top:2px; line-height:1.5}
  /* ---- Заголовок-поездка ---- */
  .trip-title{display:flex; align-items:center; gap:6px; border:0; background:none; font-family:inherit; color:var(--ink); font-size:18px; font-weight:700; letter-spacing:-.2px; padding:0; cursor:pointer; max-width:72vw; overflow:hidden}
  .trip-title #tripName{overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .trip-title .chev-d{font-size:12px; color:var(--muted); font-weight:700; flex:none}
  .trip-meta{font-size:11.5px; color:var(--muted); font-weight:600; margin-top:4px; min-height:14px}
  .trip-meta .cd{color:var(--accent)}
  /* ---- Экран поездок ---- */
  #trips{position:fixed; inset:0; z-index:80; background:var(--bg); display:flex; flex-direction:column; padding:calc(12px + env(safe-area-inset-top)) 16px calc(20px + env(safe-area-inset-bottom)); overflow-y:auto; -webkit-overflow-scrolling:touch; animation:fade .2s ease}
  #trips.hidden{display:none}
  .trips-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px}
  .trips-head h2{margin:0; font-size:21px; font-weight:700; letter-spacing:-.3px}
  .trips-head .x{border:0; background:none; color:var(--muted); font-family:inherit; font-size:15px; font-weight:600; cursor:pointer; padding:6px 4px}
  .newtrip-btn{display:flex; align-items:center; justify-content:center; gap:8px; width:100%; border:0; background:var(--accent); color:#fff; font-family:inherit; font-weight:700; font-size:15px; padding:14px; border-radius:14px; cursor:pointer; margin-bottom:16px; box-shadow:var(--shadow)}
  .newtrip-btn:active{opacity:.9}
  .trip-card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px 15px; margin-bottom:12px; box-shadow:var(--shadow); cursor:pointer; position:relative}
  .trip-card.active{border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-soft), var(--shadow)}
  .trip-card:active{transform:scale(.995)}
  .tc-top{display:flex; align-items:center; gap:8px}
  .tc-name{font-size:16px; font-weight:700; flex:1; letter-spacing:-.2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .tc-badge{font-size:10.5px; font-weight:700; color:var(--accent); background:var(--accent-soft); padding:3px 8px; border-radius:99px; flex:none}
  .tc-dates{font-size:12px; color:var(--muted); font-weight:600; margin-top:4px}
  .tc-bar{height:6px; background:var(--line); border-radius:99px; margin-top:10px; overflow:hidden}
  .tc-bar > i{display:block; height:100%; width:0; background:var(--accent); border-radius:99px}
  .tc-lbl{font-size:11px; color:var(--muted); font-weight:600; margin-top:6px}
  .tc-acts{display:flex; gap:6px; margin-top:11px}
  .tc-acts button{flex:1; border:1px solid var(--line); background:#fff; color:var(--muted); font-family:inherit; font-size:12px; font-weight:700; padding:8px; border-radius:9px; cursor:pointer}
  .tc-acts button.del{color:var(--red); border-color:#e6cfc9}
  .trips-empty{text-align:center; color:var(--muted); font-size:13px; padding:30px 12px; line-height:1.55}
  /* ---- Bottom sheet (новая/изменить поездка) ---- */
  .sheet-back{position:fixed; inset:0; z-index:90; background:rgba(30,25,15,.35); display:flex; align-items:flex-end; justify-content:center; opacity:0; transition:opacity .2s ease}
  .sheet-back.show{opacity:1}
  .sheet-back.hidden{display:none}
  .sheet-card{width:100%; max-width:640px; background:var(--card); border-radius:20px 20px 0 0; padding:8px 18px calc(18px + env(safe-area-inset-bottom)); box-shadow:0 -8px 30px rgba(40,30,10,.18); transform:translateY(100%); transition:transform .24s cubic-bezier(.2,.8,.2,1); max-height:92vh; overflow-y:auto; -webkit-overflow-scrolling:touch}
  .sheet-back.show .sheet-card{transform:none}
  .sheet-grip{width:40px; height:5px; background:var(--line); border-radius:99px; margin:6px auto 12px}
  .sheet-card h3{margin:0 0 14px; font-size:18px; font-weight:700; letter-spacing:-.2px}
  .fld{display:block; margin-bottom:12px}
  .fld > span, .fld-lbl{display:block; font-size:12px; font-weight:700; color:var(--muted); margin-bottom:6px}
  .fld input, .sel{width:100%; border:1.5px solid var(--line); background:#fff; border-radius:11px; padding:12px 13px; font-family:inherit; font-size:16px; color:var(--ink); -webkit-appearance:none; appearance:none}
  .fld input:focus, .sel:focus{outline:none; border-color:var(--accent)}
  .fld-row{display:flex; gap:10px}
  .fld-row .fld{flex:1; min-width:0}
  .seg{display:flex; gap:6px; background:var(--bg); padding:4px; border-radius:12px; margin-bottom:10px}
  .seg-b{flex:1; border:0; background:none; font-family:inherit; font-size:13.5px; font-weight:700; color:var(--muted); padding:9px; border-radius:9px; cursor:pointer}
  .seg-b.on{background:var(--card); color:var(--accent); box-shadow:var(--shadow)}
  .sel.hidden{display:none}
  .sheet-acts{display:flex; gap:10px; margin-top:8px}
  .btn-ghost{flex:1; border:1px solid var(--line); background:#fff; color:var(--muted); font-family:inherit; font-weight:700; font-size:15px; padding:13px; border-radius:12px; cursor:pointer}
  .btn-main{flex:2; border:0; background:var(--accent); color:#fff; font-family:inherit; font-weight:700; font-size:15px; padding:13px; border-radius:12px; cursor:pointer}
  .btn-main:active,.btn-ghost:active{opacity:.9}
</style>
</head>
<body>

<!-- ===== ЭКРАН ВХОДА ===== -->
<div id="lock">
  <div class="logo">🧳</div>
  <h2>Абхазия · чек-лист</h2>
  <p id="lockMsg">Войдите, чтобы открыть список</p>
  <div class="row" style="justify-content:center">
    <button id="gsi" onclick="doSignIn()" style="display:flex; align-items:center; gap:9px; background:#fff; color:#2b2620; border:1.5px solid var(--line); padding:12px 18px; font-weight:700; font-size:15px">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Войти через Google
    </button>
  </div>
  <div class="err" id="pwErr"></div>
  <div id="signout" style="display:none; margin-top:4px">
    <button class="reset" onclick="doSignOut()">Выйти и войти другим аккаунтом</button>
  </div>
</div>

<!-- ===== ПРИЛОЖЕНИЕ ===== -->
<div id="app" style="display:none">
  <header>
    <div class="h-row">
      <button class="trip-title" onclick="openTrips()"><span>🧳</span><span id="tripName">Поездка</span><span class="chev-d">▾</span></button>
      <div class="h-right">
        <button class="editbtn" id="editBtn" onclick="toggleEdit()">✎ Править</button>
      </div>
    </div>
    <div class="trip-meta" id="tripMeta"></div>
    <div class="bar"><i id="totalBar"></i></div>
    <div class="bar-lbl" id="totalLbl">—</div>
  </header>
  <main>
    <div id="pages"></div>
    <div class="foot">
      <button class="reset" onclick="resetChecks()">↺ Снять все галочки</button>
      <button class="reset" onclick="doSignOut()">⎋ Выйти</button>
      <div class="hint" id="hint"></div>
    </div>
  </main>
  <nav id="tabs"></nav>
</div>

<!-- ===== ЭКРАН ПОЕЗДОК ===== -->
<div id="trips" class="hidden">
  <div class="trips-head">
    <h2>Поездки</h2>
    <button class="x" onclick="closeTrips()">Закрыть</button>
  </div>
  <button class="newtrip-btn" onclick="openNewTrip()">＋ Новая поездка</button>
  <div id="tripList"></div>
</div>

<!-- ===== BOTTOM SHEET: новая / изменить поездку ===== -->
<div id="sheet" class="sheet-back hidden" onclick="if(event.target===this) closeSheet()">
  <div class="sheet-card">
    <div class="sheet-grip"></div>
    <h3 id="sheetTitle">Новая поездка</h3>
    <label class="fld"><span>Локация</span>
      <input id="fLoc" type="text" placeholder="Например, Абхазия" autocomplete="off" enterkeyhint="done">
    </label>
    <div class="fld-row">
      <label class="fld"><span>Дата начала</span><input id="fFrom" type="date"></label>
      <label class="fld"><span>Дата конца</span><input id="fTo" type="date"></label>
    </div>
    <div id="sheetSource">
      <span class="fld-lbl">Из чего создать</span>
      <div class="seg">
        <button type="button" id="srcEmpty" class="seg-b on" onclick="setSource('empty')">Пустой</button>
        <button type="button" id="srcCopy" class="seg-b" onclick="setSource('copy')">Копия поездки</button>
      </div>
      <select id="fCopy" class="sel hidden"></select>
    </div>
    <div class="sheet-acts">
      <button class="btn-ghost" onclick="closeSheet()">Отмена</button>
      <button class="btn-main" id="sheetSave" onclick="saveSheet()">Создать</button>
    </div>
  </div>
</div>

<script>
/* ================= ДОСТУП (только вход через Google) =================
   В коде НЕТ ни списка разрешённых email, ни содержимого списка.
   Кто имеет доступ к данным — решают серверные правила Firestore. */
function doSignIn(){ if(window.AUTH) window.AUTH.signIn(); }
function doSignOut(){ if(window.AUTH) window.AUTH.signOut(); }

let __authedUser=null;
function showLogin(){
  document.getElementById('lock').classList.remove('hidden');
  document.getElementById('app').style.display='none';
  document.getElementById('lockMsg').textContent='Войдите, чтобы открыть список';
  document.getElementById('pwErr').textContent='';
  document.getElementById('gsi').style.display='flex';
  document.getElementById('signout').style.display='none';
}
function showDenied(email){
  document.getElementById('lock').classList.remove('hidden');
  document.getElementById('app').style.display='none';
  document.getElementById('lockMsg').textContent='Нет доступа'+(email?(' для '+email):'');
  document.getElementById('pwErr').textContent='Этот аккаунт не в списке. Попросите добавить его.';
  document.getElementById('gsi').style.display='none';
  document.getElementById('signout').style.display='block';
}
/* Вызывается из Firebase-модуля при изменении статуса входа */
window.onAuthChange = function(user){
  __authedUser = user;
  if(user){ showApp(); } else { showLogin(); }
};
function showApp(){
  document.getElementById('lock').classList.add('hidden');
  document.getElementById('app').style.display='block';
  if(!window.__built){ window.__built=true; render(); registerSW(); startCloud(); }
}
function registerSW(){
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
}

/* ================= МОДЕЛЬ =================
   Содержимого в коде нет — весь список приходит из базы (Firestore).
   Пустой старт нужен только для самого первого запуска на новом устройстве. */
const KEY="abkhazia_v2";
let uid=1; const nid=()=> 'i'+(Date.now().toString(36))+(uid++);
function tid(){ return 't'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function newTrip(o){ o=o||{}; return {id:tid(), location:o.location||'Поездка', dateFrom:o.dateFrom||'', dateTo:o.dateTo||'', createdAt:o.createdAt||Date.now(), model:o.model||[]}; }
function freshState(){ return {v:2, activeTripId:null, trips:[]}; }
/* Заворачиваем старый формат (просто массив категорий) в первую поездку. Идемпотентно. */
function migrate(raw){
  if(Array.isArray(raw)){ const t=newTrip({location:'Абхазия', model:raw}); return {v:2, activeTripId:t.id, trips:[t]}; }
  if(raw && raw.v>=2 && Array.isArray(raw.trips)) return raw;
  return freshState();
}
let STATE, MODEL=[];
function activeTrip(){ return STATE.trips.find(t=>t.id===STATE.activeTripId) || STATE.trips[0] || null; }
function syncModelRef(){ const t=activeTrip(); if(t) STATE.activeTripId=t.id; MODEL = t ? t.model : []; }
function load(){ try{const s=localStorage.getItem(KEY); if(s){ STATE=migrate(JSON.parse(s)); syncModelRef(); return; }}catch(e){} STATE=freshState(); syncModelRef(); }
function save(){ localUpdatedAt=Date.now(); try{localStorage.setItem(KEY,JSON.stringify(STATE)); localStorage.setItem(KEY+"_ts",String(localUpdatedAt));}catch(e){} pushCloud(); }
load();
let localUpdatedAt=0; try{ localUpdatedAt=parseInt(localStorage.getItem(KEY+"_ts")||"0",10)||0; }catch(e){}
const myId=Math.random().toString(36).slice(2);

/* ===== ОБЛАЧНАЯ СИНХРОНИЗАЦИЯ (Firebase) ===== */
let __pushTimer=null;
function pushCloud(){
  if(!window.CLOUD) return;
  clearTimeout(__pushTimer);
  __pushTimer=setTimeout(()=>{ try{ window.CLOUD.push({data:JSON.stringify(STATE),updatedAt:localUpdatedAt,writer:myId}); }catch(e){} }, 400);
}
function startCloud(){
  const go=()=>{
    if(!window.CLOUD) return;
    window.CLOUD.subscribe(d=>{
      if(!d){ if(!localUpdatedAt) localUpdatedAt=Date.now(); pushCloud(); return; }
      if(d.writer===myId) return;
      if((d.updatedAt||0) >= localUpdatedAt){
        let parsed; try{ parsed=JSON.parse(d.data); }catch(e){ return; }
        STATE=migrate(parsed); syncModelRef();
        localUpdatedAt=d.updatedAt||Date.now();
        try{ localStorage.setItem(KEY,JSON.stringify(STATE)); localStorage.setItem(KEY+"_ts",String(localUpdatedAt)); }catch(e){}
        if((active===null || !MODEL.some(p=>p.key===active)) && MODEL.length) active=MODEL[0].key;
        render(); if(tripsOpen) renderTrips();
      } else { pushCloud(); }
    }, (e)=>{
      if(e && e.code==='permission-denied'){ showDenied(__authedUser && __authedUser.email); }
    });
  };
  if(window.CLOUD){ go(); } else { window.addEventListener('cloud-ready', go, {once:true}); }
}

/* ================= РЕНДЕР ================= */
const CHECK='<svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const pagesEl=document.getElementById('pages');
const tabsEl=document.getElementById('tabs');
let active = MODEL[0] ? MODEL[0].key : null;
const openState={};
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function render(){
  renderTripHeader();
  if(MODEL.length && !MODEL.some(p=>p.key===active)) active=MODEL[0].key;
  pagesEl.innerHTML=''; tabsEl.innerHTML='';
  if(!MODEL.length){
    const noTrips=!STATE.trips.length;
    pagesEl.innerHTML = noTrips
      ? '<div class="loading">Загрузка… или создайте поездку, нажав «🧳» вверху.</div>'
      : '<div class="loading">В этой поездке пока нет категорий.<br><button class="reset" style="margin-top:12px" onclick="addCategory()">＋ Добавить категорию</button></div>';
    document.getElementById('totalBar').style.width='0%';
    document.getElementById('totalLbl').textContent='—';
    document.getElementById('hint').textContent='';
    return;
  }
  MODEL.forEach(p=>{
    const page=document.createElement('div');
    page.className='page'+(p.key===active?' on':''); page.id='page-'+p.key;
    let html=p.intro?`<div class="intro">${esc(p.intro)}</div>`:'';
    p.groups.forEach((g,gi)=>{
      if(g.sub){ html+=`<div class="sub">${esc(g.sub)}</div>`; return; }
      const gk=p.key+'-'+gi;
      const closed=openState[gk]===false?' closed':'';
      html+=`<div class="group${closed}" data-gk="${gk}">
        <div class="g-head" onclick="toggleGroup('${gk}')">
          <span class="emo">${g.emo||''}</span><span class="ttl">${esc(g.title)}</span>
          <span class="cnt" id="cnt-${gk}"></span><span class="chev">▼</span>
        </div><div class="items">`;
      g.items.forEach(it=>{
        const note=it.n?`<span class="note">↳ ${esc(it.n)}</span>`:'';
        html+=`<div class="item${it.done?' checked':''}" data-id="${it.id}" onclick="toggleItem('${it.id}')">
          <span class="box">${CHECK}</span><span class="lbl">${esc(it.t)}${note}</span>
          <span class="acts">
            <button class="act" onclick="editItem(event,'${it.id}')">✎</button>
            <button class="act del" onclick="delItem(event,'${it.id}')">✕</button>
          </span></div>`;
      });
      html+=`</div><div class="addrow" onclick="addItem('${p.key}',${gi})">＋ Добавить пункт</div></div>`;
    });
    html+=`<div class="newgrp" onclick="addGroup('${p.key}')">＋ Подкатегория</div>`;
    page.innerHTML=html; pagesEl.appendChild(page);
    const btn=document.createElement('button');
    btn.dataset.p=p.key; if(p.key===active) btn.classList.add('on');
    btn.innerHTML=`<span class="ic">${p.icon||'📋'}</span><span class="tx">${esc(p.tab)}</span><span class="dot" id="dot-${p.key}"></span>`;
    btn.onclick=()=>go(p.key); tabsEl.appendChild(btn);
  });
  document.getElementById('hint').textContent='Отметки сохраняются автоматически. «Править» — чтобы менять пункты.';
  refresh();
}
function findItem(id){ for(const p of MODEL) for(const g of p.groups) if(g.items) for(const it of g.items) if(it.id===id) return {it,g,p}; return null; }
function toggleGroup(gk){ openState[gk]=!(openState[gk]!==false); document.querySelector(`.group[data-gk="${gk}"]`).classList.toggle('closed'); }
function toggleItem(id){
  if(document.body.classList.contains('editmode')) return;
  const f=findItem(id); if(!f) return; f.it.done=!f.it.done; save();
  document.querySelector(`.item[data-id="${id}"]`).classList.toggle('checked',f.it.done); refresh();
}
function editItem(e,id){ e.stopPropagation(); const f=findItem(id); if(!f) return;
  const t=prompt("Текст пункта:",f.it.t); if(t===null||t.trim()==="") return;
  const n=prompt("Пометка (необязательно):",f.it.n||"");
  f.it.t=t.trim(); f.it.n=(n===null?f.it.n:n.trim()); save(); render(); }
function delItem(e,id){ e.stopPropagation(); const f=findItem(id); if(!f) return;
  if(!confirm("Удалить: «"+f.it.t+"»?")) return; f.g.items=f.g.items.filter(x=>x.id!==id); save(); render(); }
function addItem(pk,gi){ const t=prompt("Новый пункт:"); if(t===null||t.trim()==="") return;
  const n=prompt("Пометка (необязательно):",""); const p=MODEL.find(x=>x.key===pk);
  p.groups[gi].items.push({id:nid(),t:t.trim(),n:(n||"").trim(),done:false}); save(); render(); }
function go(pk){ active=pk;
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('on',p.id==='page-'+pk));
  [...tabsEl.children].forEach(b=>b.classList.toggle('on',b.dataset.p===pk)); window.scrollTo({top:0}); }
function toggleEdit(){ const on=document.body.classList.toggle('editmode');
  document.getElementById('editBtn').textContent=on?'✓ Готово':'✎ Править';
  document.getElementById('hint').textContent=on
    ?'Режим правки: ✎ — изменить, ✕ — удалить, «＋ Добавить пункт» — новый. Отметки не ставятся.'
    :'Отметки сохраняются автоматически. «Править» — чтобы менять пункты.'; }
function resetChecks(){ if(!confirm('Снять все галочки?')) return;
  MODEL.forEach(p=>p.groups.forEach(g=>g.items&&g.items.forEach(it=>it.done=false))); save(); render(); }
function refresh(){
  let T=0,D=0;
  MODEL.forEach(p=>{ let pt=0,pd=0;
    p.groups.forEach((g,gi)=>{ if(!g.items) return; let gt=0,gd=0;
      g.items.forEach(it=>{gt++; if(it.done)gd++;}); pt+=gt; pd+=gd;
      const c=document.getElementById(`cnt-${p.key}-${gi}`);
      if(c){c.textContent=`${gd}/${gt}`; c.classList.toggle('full',gt>0&&gd===gt);} });
    T+=pt; D+=pd;
    const dot=document.getElementById('dot-'+p.key); const btn=[...tabsEl.children].find(b=>b.dataset.p===p.key);
    if(!dot||!btn) return;
    const rem=pt-pd;
    if(rem>0){dot.textContent=rem; dot.style.display='flex'; btn.classList.remove('done');}
    else{dot.textContent='✓'; dot.style.display=pt>0?'flex':'none'; btn.classList.add('done');} });
  document.getElementById('totalBar').style.width=(T?D/T*100:0)+'%';
  document.getElementById('totalLbl').textContent=`${D} из ${T} · ${T?Math.round(D/T*100):0}%`;
}

/* ================= ПОЕЗДКИ ================= */
const MON=['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
function pd(s){ if(!s) return null; const d=new Date(s+'T00:00:00'); return isNaN(d.getTime())?null:d; }
function fmtOne(s){ const d=pd(s); return d? d.getDate()+' '+MON[d.getMonth()] : ''; }
function fmtRange(a,b){
  if(!a&&!b) return '';
  if(a&&b){ const da=pd(a),db=pd(b); if(!da||!db) return fmtOne(a||b);
    if(a===b) return fmtOne(a);
    if(da.getMonth()===db.getMonth() && da.getFullYear()===db.getFullYear()) return da.getDate()+'–'+db.getDate()+' '+MON[db.getMonth()];
    return fmtOne(a)+' – '+fmtOne(b);
  }
  return fmtOne(a||b);
}
function plural(n,one,few,many){ const m=n%100; if(m>=11&&m<=14) return many; const d=n%10; if(d===1) return one; if(d>=2&&d<=4) return few; return many; }
function countdown(t){
  const today=new Date(); today.setHours(0,0,0,0);
  const from=pd(t.dateFrom), to=pd(t.dateTo)||from;
  if(from){ const diff=Math.round((from-today)/86400000);
    if(diff>1) return '⏳ '+diff+' '+plural(diff,'день','дня','дней');
    if(diff===1) return '⏳ завтра';
    if(diff===0) return '🎒 сегодня старт'; }
  if(to){ const dt=Math.round((to-today)/86400000);
    return dt>=0 ? '🧭 в поездке' : '✓ завершена'; }
  return '';
}
function renderTripHeader(){
  const t=activeTrip();
  document.getElementById('tripName').textContent = t ? t.location : 'Поездка';
  const meta=document.getElementById('tripMeta');
  if(!t){ meta.innerHTML=''; return; }
  const dates=fmtRange(t.dateFrom,t.dateTo), cd=countdown(t);
  meta.innerHTML = (dates?esc(dates):'') + (dates&&cd?' · ':'') + (cd?`<span class="cd">${esc(cd)}</span>`:'');
}
let tripsOpen=false;
function openTrips(){ tripsOpen=true; renderTrips(); document.getElementById('trips').classList.remove('hidden'); window.scrollTo({top:0}); }
function closeTrips(){ tripsOpen=false; document.getElementById('trips').classList.add('hidden'); }
function tripProgress(t){ let T=0,D=0; (t.model||[]).forEach(p=>p.groups&&p.groups.forEach(g=>g.items&&g.items.forEach(it=>{T++; if(it.done)D++;}))); return {D,T}; }
function renderTrips(){
  const list=document.getElementById('tripList');
  if(!STATE.trips.length){ list.innerHTML='<div class="trips-empty">Пока нет поездок.<br>Нажмите «＋ Новая поездка», чтобы создать первую.</div>'; return; }
  const trips=[...STATE.trips].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  list.innerHTML=trips.map(t=>{
    const {D,T}=tripProgress(t); const pct=T?Math.round(D/T*100):0;
    const act=t.id===STATE.activeTripId; const dates=fmtRange(t.dateFrom,t.dateTo);
    return `<div class="trip-card${act?' active':''}" onclick="switchTrip('${t.id}')">
      <div class="tc-top"><span class="tc-name">🧳 ${esc(t.location)}</span>${act?'<span class="tc-badge">открыта</span>':''}</div>
      ${dates?`<div class="tc-dates">${esc(dates)}</div>`:''}
      <div class="tc-bar"><i style="width:${pct}%"></i></div>
      <div class="tc-lbl">${D} из ${T} · ${pct}%</div>
      <div class="tc-acts">
        <button onclick="openEditTrip(event,'${t.id}')">✎ Изменить</button>
        <button onclick="duplicateTrip(event,'${t.id}')">⧉ Копия</button>
        <button class="del" onclick="deleteTrip(event,'${t.id}')">✕ Удалить</button>
      </div>
    </div>`;
  }).join('');
}
function switchTrip(id){
  const t=STATE.trips.find(x=>x.id===id); if(!t) return;
  STATE.activeTripId=id; syncModelRef();
  active = MODEL[0] ? MODEL[0].key : null;
  save(); closeTrips(); render(); window.scrollTo({top:0});
}
/* Глубокая копия структуры поездки: новые id, галочки сброшены */
function cloneModel(model){
  return (model||[]).map(p=>({
    key:'c'+Date.now().toString(36)+(uid++),
    icon:p.icon||'📋', tab:p.tab||'', title:p.title||'', intro:p.intro||'',
    groups:(p.groups||[]).map(g=>{
      const ng={...g};
      if(ng.items) ng.items=ng.items.map(it=>({id:nid(), t:it.t, n:it.n||'', done:false}));
      return ng;
    })
  }));
}
/* --- Bottom sheet: новая / изменить поездку --- */
let sheetMode='new', sheetTripId=null, sheetSource='empty';
function openSheet(){ const s=document.getElementById('sheet'); s.classList.remove('hidden'); requestAnimationFrame(()=>s.classList.add('show')); }
function closeSheet(){ const s=document.getElementById('sheet'); s.classList.remove('show'); setTimeout(()=>s.classList.add('hidden'),220); }
function setSource(s){ sheetSource=s;
  document.getElementById('srcEmpty').classList.toggle('on',s==='empty');
  document.getElementById('srcCopy').classList.toggle('on',s==='copy');
  document.getElementById('fCopy').classList.toggle('hidden',s!=='copy');
}
function openNewTrip(){
  sheetMode='new'; sheetTripId=null;
  document.getElementById('sheetTitle').textContent='Новая поездка';
  document.getElementById('sheetSave').textContent='Создать';
  document.getElementById('fLoc').value='';
  document.getElementById('fFrom').value='';
  document.getElementById('fTo').value='';
  document.getElementById('sheetSource').style.display='';
  const trips=[...STATE.trips].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  document.getElementById('fCopy').innerHTML=trips.map(t=>{
    const d=fmtRange(t.dateFrom,t.dateTo);
    return `<option value="${t.id}">${esc(t.location)}${d?' · '+esc(d):''}</option>`;
  }).join('');
  document.getElementById('srcCopy').style.display=trips.length?'':'none';
  setSource('empty');
  openSheet();
}
function openEditTrip(e,id){ e.stopPropagation();
  const t=STATE.trips.find(x=>x.id===id); if(!t) return;
  sheetMode='edit'; sheetTripId=id;
  document.getElementById('sheetTitle').textContent='Изменить поездку';
  document.getElementById('sheetSave').textContent='Сохранить';
  document.getElementById('fLoc').value=t.location||'';
  document.getElementById('fFrom').value=t.dateFrom||'';
  document.getElementById('fTo').value=t.dateTo||'';
  document.getElementById('sheetSource').style.display='none';
  openSheet();
}
function saveSheet(){
  const loc=document.getElementById('fLoc').value.trim();
  if(!loc){ document.getElementById('fLoc').focus(); return; }
  const from=document.getElementById('fFrom').value||'';
  const to=document.getElementById('fTo').value||'';
  if(from&&to&&to<from){ alert('Дата конца раньше даты начала.'); return; }
  if(sheetMode==='edit'){
    const t=STATE.trips.find(x=>x.id===sheetTripId);
    if(t){ t.location=loc; t.dateFrom=from; t.dateTo=to; }
    save(); closeSheet(); renderTrips(); renderTripHeader();
    return;
  }
  let model=[];
  if(sheetSource==='copy'){ const src=STATE.trips.find(x=>x.id===document.getElementById('fCopy').value); if(src) model=cloneModel(src.model); }
  const t=newTrip({location:loc, dateFrom:from, dateTo:to, model});
  STATE.trips.push(t); STATE.activeTripId=t.id; syncModelRef();
  active = MODEL[0] ? MODEL[0].key : null;
  save(); closeSheet(); closeTrips(); render();
}
function duplicateTrip(e,id){ e.stopPropagation();
  const t=STATE.trips.find(x=>x.id===id); if(!t) return;
  const copy=newTrip({location:t.location+' (копия)', dateFrom:t.dateFrom, dateTo:t.dateTo, model:cloneModel(t.model)});
  STATE.trips.push(copy); save(); renderTrips();
}
function deleteTrip(e,id){ e.stopPropagation();
  const t=STATE.trips.find(x=>x.id===id); if(!t) return;
  if(!confirm('Удалить поездку «'+t.location+'»? Отменить будет нельзя.')) return;
  STATE.trips=STATE.trips.filter(x=>x.id!==id);
  if(STATE.activeTripId===id){ STATE.activeTripId = STATE.trips[0]?STATE.trips[0].id:null; syncModelRef(); active = MODEL[0]?MODEL[0].key:null; }
  save(); renderTrips(); render();
}
/* Минимальное создание категорий/подкатегорий (эмодзи-пикер — на следующем этапе) */
function addCategory(){
  const name=prompt('Название категории (можно с эмодзи в начале):'); if(name===null||name.trim()==='') return;
  const key='c'+Date.now().toString(36)+(uid++);
  MODEL.push({key, icon:'📋', tab:name.trim().slice(0,10), title:name.trim(), intro:'', groups:[]});
  active=key; save(); render();
}
function addGroup(pk){
  const p=MODEL.find(x=>x.key===pk); if(!p) return;
  const title=prompt('Название подкатегории (можно с эмодзи в начале):'); if(title===null||title.trim()==='') return;
  p.groups.push({emo:'', title:title.trim(), items:[]}); save(); render();
}

  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyDob_HdG-ihclIacDESG3sdISugCXAC43U",

    projectId: "abkhazia-checklist",
    storageBucket: "abkhazia-checklist.firebasestorage.app",

  };
  try {
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    };
    getRedirectResult(auth).catch(()=>{});
    onAuthStateChanged(auth, (user) => {
